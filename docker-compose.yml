services:

  postgres:
    image: postgres:16
    container_name: rag_postgres
    restart: always

    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_DB: rag_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  qdrant:
    image: qdrant/qdrant
    container_name: rag_qdrant
    restart: always

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage


  redis:
    image: redis/redis-stack:latest    
    container_name: rag_redis
    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data


volumes:
  postgres_data:
  qdrant_data:
  redis_data: